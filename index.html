<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UP Vision Drawer Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4159833368007973"
     crossorigin="anonymous"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #f7f9fc;
            padding-bottom: 120px; /* Space for Ad and Footer */
        }
        /* Fixed Ad Container */
        #ad-bottom-container {
            position: fixed;
            bottom: 40px; /* Sits above the footer */
            left: 0;
            width: 100%;
            background: #fff;
            border-top: 1px solid #e5e7eb;
            display: flex;
            justify-content: center;
            padding: 5px 0;
            z-index: 999;
        }
        /* Fixed Footer */
        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40px;
            background-color: #1e40af; /* Blue-800 */
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.875rem;
            font-weight: 500;
            z-index: 1000;
        }
        .logo-container img {
            max-width: 420px;
            margin: 0 auto 1rem;
        }
    </style>
</head>
<body>
    <div id="app" class="w-full max-w-sm p-6 bg-white rounded-xl shadow-2xl space-y-6 m-4">
        <div class="logo-container text-center">
            <img src="https://kspatel45.github.io/Drawer-Remote/logo.png" alt="UP Vision Logo">
        </div>

     /*   <h1 class="text-3xl font-bold text-center text-blue-700">UP Vision</h1>  */
        <p class="text-center text-red-500 font-medium">Drawer Remote Control</p>
        
        <div id="mainInterface" class="space-y-4">
            <div id="drawerButtons" class="grid grid-cols-2 gap-4">
                <button data-drawer="1" class="drawer-btn w-full bg-blue-600 text-white font-semibold p-4 rounded-lg hover:bg-blue-700 active:scale-95 transition-all shadow-md">Drawer 1</button>
                <button data-drawer="2" class="drawer-btn w-full bg-green-600 text-white font-semibold p-4 rounded-lg hover:bg-green-700 active:scale-95 transition-all shadow-md">Drawer 2</button>
                <button data-drawer="3" class="drawer-btn w-full bg-yellow-600 text-white font-semibold p-4 rounded-lg hover:bg-yellow-700 active:scale-95 transition-all shadow-md">Drawer 3</button>
                <button data-drawer="4" class="drawer-btn w-full bg-red-600 text-white font-semibold p-4 rounded-lg hover:bg-red-700 active:scale-95 transition-all shadow-md">Drawer 4</button>
            </div>
        </div>

        <div id="messageBox" class="p-3 mt-4 text-sm rounded-lg border-l-4 hidden"></div>

        <div id="logBox" class="p-3 mt-4 text-xs bg-gray-100 rounded-lg h-24 overflow-y-auto">
            <p class="font-bold text-gray-700 mb-1">System Status:</p>
            <p id="authStatus" class="text-gray-500 italic">Connecting to Firebase...</p>
        </div>
    </div>

    <div id="ad-bottom-container">
        <ins class="adsbygoogle"
             style="display:inline-block;width:320px;height:50px"
             data-ad-client="ca-pub-4159833368007973"
             data-ad-slot="4859544895"></ins>
        <script>
             (adsbygoogle = window.adsbygoogle || []).push({});
        </script>
    </div>

    <footer>
        Created by Kartik Patel
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC73xJWRk8I2DrmfYRAO_LPN86XLufagYY",
            authDomain: "drawer-remote.firebaseapp.com",
            projectId: "drawer-remote",
            storageBucket: "drawer-remote.firebasestorage.app",
            messagingSenderId: "548579293210",
            appId: "1:548579293210:web:2f3be6bca736ef762cb9a3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        
        const authStatus = document.getElementById('authStatus');
        const messageBox = document.getElementById('messageBox');

        function showUIFeedback(msg, isError = false) {
            messageBox.textContent = msg;
            messageBox.className = `p-3 mt-4 text-sm rounded-lg border-l-4 ${isError ? 'bg-red-100 text-red-700 border-red-500' : 'bg-green-100 text-green-700 border-green-500'}`;
            messageBox.classList.remove('hidden');
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                authStatus.textContent = "✓ Connected (ID: " + user.uid.substring(0,6) + ")";
                authStatus.className = "text-green-600 font-bold";
            } else {
                try {
                    await signInAnonymously(auth);
                } catch (err) {
                    authStatus.textContent = "✗ Connection Error: " + err.code;
                    console.error(err);
                }
            }
        });

        document.getElementById('drawerButtons').addEventListener('click', async (e) => {
            const btn = e.target.closest('.drawer-btn');
            if (!btn || !auth.currentUser) return;

            const cmdMap = { 1: "A\r", 2: "B\r", 3: "C\r", 4: "D\r" };
            const drawerId = btn.dataset.drawer;

            try {
                showUIFeedback(`Activating Drawer ${drawerId}...`);
                await addDoc(collection(db, `/artifacts/drawer-remote/public/data/remote_commands`), {
                    message: cmdMap[drawerId],
                    timestamp: serverTimestamp(),
                    senderId: auth.currentUser.uid,
                    processed: false 
                });
                showUIFeedback(`Drawer ${drawerId} Success!`);
            } catch (err) {
                showUIFeedback("Command Failed: " + err.message, true);
            }
        });
    </script>
</body>
</html>
